# prek/pre-commit configuration
# Run `uv run prek install` to install git hooks after cloning

# Install pre-push hook by default (not pre-commit)
default_install_hook_types: [pre-push]

repos:
  - repo: local
    hooks:
      - id: verify
        name: Run full verification (format, lint, typecheck, test)
        entry: make verify
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
