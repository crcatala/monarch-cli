name: "Phase 3b: Core Commands"
description: |
  Implement all MVP commands that cover 90% of user needs:
  - Plain output format with TTY-aware defaults (prerequisite)
  - Accounts (list, refresh)
  - Transactions (list, update)
  - Budgets (list)
  - Cashflow (summary)
  - Categories (list)
  - Update main entry point with all commands + CLI best practices global flags
  - Security documentation for MONARCH_TOKEN
  - Document shell completions

  After this phase, the CLI is feature-complete for MVP.

branch: "ralph/phase-3-commands"
create_pr: true
issue_tracker: none
pre_commit: "make verify"

tasks:
  - title: "Plain Output Format (Human-Friendly Default)"
    status: done
    ticket: mc-8d99
    acceptance:
      - "OutputFormat.PLAIN added to enum in output/__init__.py"
      - "src/monarch_cli/output/plain.py exists with format_plain() function"
      - "Plain format uses emoji icons and labeled fields"
      - "get_default_format() returns PLAIN for TTY, JSON when piped"
      - "should_use_color() checks NO_COLOR, TERM=dumb, and TTY"
      - "output() uses TTY-aware default when format=None"
      - "Plain output has no ANSI codes when piped or NO_COLOR set"
      - "Unit tests for plain formatter and TTY detection"
    notes: |
      This ensures consistency with auth commands (styled plain text default)
      and follows CLI best practices (human-friendly in terminal, JSON when piped).
      
      Example plain output:
      ```
      🔖 Id: acc_123abc
      📌 Name: Chase Checking
      💰 Balance: 1234.56
      🏦 Institution: Chase
      
      ──────────────────────────────────────────────────
      
      🔖 Id: acc_456def
      📌 Name: Savings Account
      ...
      ```
      
      TTY behavior:
      ```bash
      monarch accounts list          # Plain (terminal)
      monarch accounts list | jq .   # JSON (piped)
      monarch accounts list --json   # JSON (explicit)
      ```

