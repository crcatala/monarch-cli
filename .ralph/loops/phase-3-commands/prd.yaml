  - title: "Update Main Entry Point & Global Flags"
    status: pending
    ticket: mc-0c0a
    acceptance:
      # Command Registration
      - "src/monarch_cli/main.py registers all command groups"
      - "app.add_typer(auth.app, name='auth')"
      - "app.add_typer(accounts.app, name='accounts')"
      - "app.add_typer(transactions.app, name='transactions')"
      - "app.add_typer(budgets.app, name='budgets')"
      - "app.add_typer(cashflow.app, name='cashflow')"
      - "app.add_typer(categories.app, name='categories')"
      - "`monarch --help` shows all command groups"
      - "Each command group's --help works"
      # Global Flags (CLI Best Practices)
      - "`--version` works with NO -v shortcut (version is long-only)"
      - "`-v, --verbose` shows operational progress messages"
      - "`--debug` shows stack traces and implies verbose"
      - "`--json` sets default output format to JSON globally"
      - "`--no-color` disables colored output"
      - "NO_COLOR env var is still respected"
      # Output Module Updates
      - "set_debug() / is_debug() functions exist in output module"
      - "set_default_format() / get_default_format() functions exist"
      - "error_handler.py uses is_debug() for stack traces (not is_verbose())"
    notes: |
      CLI Best Practices Fix (per clig.dev):
      
      BEFORE (wrong):
      - `-v` → version (should be verbose!)
      - `-V` → verbose (non-standard)
      
      AFTER (correct):
      - `--version` → version (no short flag)
      - `-v, --verbose` → operational progress
      - `--debug` → stack traces + implies verbose
      - `--json` → global JSON output shortcut
      - `--no-color` → disable colors
      
      Test commands:
      ```bash
      monarch --help                 # Shows all groups
      monarch --version              # Shows version
      monarch -v accounts list       # Verbose mode
      monarch --debug accounts list  # Debug with stack traces
      monarch --json accounts list   # JSON output
      monarch --no-color auth doctor # No colors
      ```

  - title: "MONARCH_TOKEN Security Documentation"
    status: pending
    ticket: mc-da1f
    acceptance:
      - "`monarch auth setup` shows Security Considerations section"
      - "Documents keyring as most secure option"
      - "Documents file storage as moderate security"
      - "Documents MONARCH_TOKEN env var risks explicitly"
      - "Provides guidance for CI/CD secret injection (GitHub Actions, GitLab CI, Docker)"
    notes: |
      Per CLI best practices, environment variables for secrets are a "documented risk":
      - Visible in process listings (ps aux)
      - May be logged by shells or process managers
      - Can leak into child processes
      
      The auth setup command should educate users on secure alternatives and
      when MONARCH_TOKEN is appropriate (CI/CD with proper secret injection).

